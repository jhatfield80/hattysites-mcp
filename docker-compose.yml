version: '3.9'

services:
  # MCP Server - Claude connects to this endpoint
  mcp-server:
    build: .
    container_name: hatty-mcp-server
    command: python server/main.py
    ports:
      - "8000:8000"
    volumes:
      - ./credentials:/app/credentials
      - ./config:/app/config
      - ./skills:/app/skills
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - hatty-network

  # Orchestrator - Runs all skills automatically on schedule
  orchestrator:
    build: .
    container_name: hatty-orchestrator
    command: python agents/orchestrator.py
    volumes:
      - ./credentials:/app/credentials
      - ./config:/app/config
      - ./skills:/app/skills
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - hatty-network

networks:
  hatty-network:
    driver: bridge

volumes:
  logs:
    driver: local
